name: Docker CI

on:
  push:
    branches:
      - main
      

jobs:
   docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devops-learning .
         

      - name: Run Docker Container
        run: docker run -d -p 3000:3000 devops-learning

      - name: Check running containers
        run: node index.js &